name: upquizie

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: upquizie-nginx
    depends_on:
      - web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: upquizie-web
    expose:
      - "80"
    restart: unless-stopped

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: upquizie-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: "8000"
      DATABASE_URL: "postgres://upquizie:upquizie@postgres:5432/examdb?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      RAG_SERVICE_URL: "http://rag:7000"
      CORS_ORIGINS: "http://localhost:8080,http://localhost:5173"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped

  rag:
    build:
      context: ./backend/rag
      dockerfile: Dockerfile
    container_name: upquizie-rag
    depends_on:
      milvus:
        condition: service_started
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      PORT: "7000"
      MILVUS_ADDRESS: "milvus:19530"
      OLLAMA_URL: "http://ollama:11434"
      DATABASE_URL: "postgres://upquizie:upquizie@postgres:5432/examdb"
      EMBED_MODEL: "${EMBED_MODEL:-nomic-embed-text}"
      LLM_MODEL: "${LLM_MODEL:-gemma3:1b}"
      EMBED_DIM: "${EMBED_DIM:-768}"
      RAG_TOP_K: "${RAG_TOP_K:-2}"
      RAG_QUERY_CACHE_SIZE: "${RAG_QUERY_CACHE_SIZE:-100}"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - uploads:/app/uploads
    expose:
      - "7000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: upquizie-postgres
    environment:
      POSTGRES_USER: upquizie
      POSTGRES_PASSWORD: upquizie
      POSTGRES_DB: examdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upquizie -d examdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: upquizie-ollama
    environment:
      # Keep the model resident in GPU memory so there's no reload per request.
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_NUM_PARALLEL: "4"
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    # ---- NVIDIA GPU acceleration ----
    # Requires an NVIDIA GPU + driver and Docker GPU support (NVIDIA Container
    # Toolkit; on Windows this comes with Docker Desktop's WSL2 backend).
    # If you do NOT have an NVIDIA GPU, delete this whole `deploy:` block or
    # the stack will fail to start.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: upquizie-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: upquizie-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: upquizie-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
  etcd:
  minio:
  milvus:
  uploads:
